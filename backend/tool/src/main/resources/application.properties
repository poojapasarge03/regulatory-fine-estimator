server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/regdb
spring.datasource.username=postgres
spring.datasource.password=poo123@
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jackson.serialization.write-dates-as-timestamps=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.docker.compose.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.show-details=always

# Redis Configuration
spring.cache.type=redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000
spring.redis.jedis.pool.max-active=8
spring.redis.jedis.pool.max-idle=8
spring.redis.jedis.pool.min-idle=0
spring.redis.jedis.pool.max-wait=-1ms

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Email (configure when ready)
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=your-email@gmail.com
#spring.mail.password=your-app-password
#spring.mail.from-name=Regulatory Fine Estimator
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true

# Scheduled email cron (6-field Spring format: seconds minutes hours day month weekday)
scheduled.email.daily-reminder-cron=0 0 9 * * ?
scheduled.email.deadline-alert-cron=0 0 10 * * ?
scheduled.email.weekly-report-cron=0 0 8 ? * MON
scheduled.email.critical-alert-cron=0 0 */2 * * ?

# Scheduling
spring.task.scheduling.pool.size=5
spring.task.execution.pool.core-size=2
